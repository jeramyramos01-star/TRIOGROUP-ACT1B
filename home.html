<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ker's Car - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: auto;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-left: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        .hero {
            height: 400px;
            background: url('images/boxster.avif') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 50px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
        }

        .cars {
            padding: 40px 20px;
            text-align: center;
        }

        .car-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .car-card {
            background: white;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .car-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .car-card h3 {
            margin: 10px 0;
        }

        .car-card p {
            padding: 0 15px 15px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        button {
            background: #e60000;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-bottom: 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #cc0000;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2>Ker's Car</h2>
        <ul>
            <li><a href="home.html">HOME</a></li>
            <li><a href="index.html">Models</a></li>            
    </nav>
</header>

<section class="hero">
    <h1>Welcome to Ker's Car</h1>
</section>

<section class="cars">
    <h2>Featured Cars</h2>
    <div class="car-container">

        <div class="car-card">
            <img src="images/taycan1.png" alt="Taycan">
            <h3>Taycan</h3>
            <p>Experience speed and performance like never before.</p>
  
        </div>

        <div class="car-card">
            <img src="images/png1.png" alt="PNG">
            <h3>PNG</h3>
            <p>Comfort and elegance combined in one perfect ride.</p>
        </div>

        <div class="car-card">
            <img src="images/cayman2.webp" alt="Cayman">
            <h3>Cayman</h3>
            <p>Powerful and spacious for all your adventures.</p>
        </div>

    </div>
</section>

<footer>
    <p>&copy; 2026 Ker's Car</p>
</footer>

</body>
</html>
